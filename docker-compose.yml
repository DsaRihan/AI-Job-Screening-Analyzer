# ORCHESTRATION: Docker Compose setup for backend (Flask), frontend, Redis, Celery worker, and local MongoDB
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      DEV_BYPASS_AUTH: "1"
      ASYNC_TASKS_ENABLED: "1"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017/resumeAnalyzer
    ports:
      - "5000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.app.celery worker --loglevel=info --concurrency=1
    environment:
      DEV_BYPASS_AUTH: "1"
      ASYNC_TASKS_ENABLED: "1"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017/resumeAnalyzer
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - redis
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
        VITE_DEV_BYPASS: "1"
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
